<!DOCTYPE html>
<html lang="es">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Aplicación de Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evitar el desplazamiento */
            font-family: Arial, sans-serif;
        }

        #container {
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrar verticalmente */
            align-items: center; /* Centrar horizontalmente */
            height: 100%;
            padding: 20px;
            background-color: #f0f0f0; /* Color de fondo */
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%; /* Asegura que el output ocupe todo el ancho */
        }

        .button {
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div id="container">
    <h1>Mini Aplicación de Telegram</h1>

    <button class="button" id="getUser">Obtener Información del Usuario</button>
    <button class="button" id="changeTheme">Cambiar Color del Tema</button>
    <button class="button" id="closeApp">Cerrar Aplicación</button>
    <button class="button" id="expandApp">Expandir Aplicación</button> <!-- Botón para expandir -->

    <div id="output"></div>
    <div style="width:40%;background:dodgerblue;height:100%"></div>
</div>

<script>
    // Verificar si estamos en el navegador de Telegram
    if (window.Telegram) {
        alert(JSON.stringify(window.Telegram.WebApp,null,2));
        alert(window.location.href)
        // Obtener información del usuario
        document.getElementById('getUser').onclick = function() {
            const user = window.Telegram.WebApp.initDataUnsafe.user||{};
            const output = document.getElementById('output');
            output.innerHTML = `
                <h3>Información del Usuario:</h3>
                <p>ID: ${user.id||''}</p>
                ${user.photo_url ? `<img src="${user.photo_url}" alt="Foto de usuario" style="max-width:100px;"/>` : ''}
                <p>Nombre: ${user.first_name||'Anónimo'} ${user.last_name || ''}</p>
                <p>Usuario: ${user.username || 'No tiene'}</p>
            `;
        };

        // Cambiar color del tema
        document.getElementById('changeTheme').onclick = function() {
            const color = prompt("Ingresa un color en formato hex (ej. #ff5733):", "#ffffff");
            if (color) {
                window.Telegram.WebApp.setBackgroundColor(color);
                document.body.style.backgroundColor = color; // Cambia el color de fondo
                document.getElementById('output').innerHTML += `<p>Color de fondo cambiado a ${color}.</p>`;
            }
        };

        // Cerrar la aplicación
        document.getElementById('closeApp').onclick = function() {
            window.Telegram.WebApp.close();
        };

        // Expandir la aplicación
        document.getElementById('expandApp').onclick = function() {
            window.Telegram.WebApp.expand(); // Expande la aplicación a pantalla completa
        };

        // Inicializar el WebApp
        window.Telegram.WebApp.onEvent('viewportChanged', function() {
            alert('El tamaño de la ventana ha cambiado');
            window.Telegram.WebApp.expand()
        });
window.Telegram.WebApp.expand()
    } else {
        alert("Este contenido solo se puede usar dentro del navegador de Telegram.");
    }
</script>

</body>
</html>
