<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Archivos de GitHub</title>
    <style>
      *{
        box-sizing:border-box
      }
      [for="tab"] {
        display: inline-block;
        vertical-align: middle;
        border: none;
        border-radius: .2em;
        color: white;
        padding: .3em;
        outline: 0;
        text-shadow:0 0 1px #000;
        border: 1px solid #595ef1bd;
        white-space:nowrap;
        margin:.1em
      }
      button {
        display: inline-block;
        vertical-align: middle;
        border: none;
        border-radius: .2em;
        color: white;
        padding: .3em;
        outline: 0;
        text-shadow:0 0 1px #000;
        background-color: dodgerblue;
        border: 1px solid #595ef1bd;
        white-space:nowrap;
        margin:.1em
      }
      input,textarea{
        width:100%;
        border-radius: .2em;
        margin:.1em;
        outline:0;
        border:solid 1px #acacac;
        font-size:1em;
      }
      textarea {
        resize: none;
        height:100%;
        width:calc( 100% - .2em)
      }
      input[type="file"]::file-selector-button {
        width: 2%;
        display:noner;
        color: transparent;
      }
      section {
        display:flex;
        width:100%;
        align-items: stretch;
      }
      main,.box,.box-a{
        width:100%;
        height:100%;
        display:flex;
        flex-direction:column;
        overflow:auto
      }
      main{
        padding:.4em
      }
      .box-a{
        flex-direction:row
      }
      
      html,body{
        width:100%;
        height:100%;
        margin:0;
        padding:0;
        overflow:auto;
      }
      
      body {
        background: var(--background,#444);
        box-shadow: inset 0 0 5em var(--bg-shadow,#000);
        color: var(--color-font,#fff);
        font-family: Arial,
        sans-serif;
      }
      #fileList {
        width:30%;
        height:100%;
      }
      
      .ruta{
        font-weight:900;
        background:var(--ruta,#dcdcdc);
        width:calc(100% - .6em);
        margin:0 .3em;
        border-radius: .3em;
        box-shadow:inset 0 0 .1em #000;
      }
      .padding{
        padding:.3em
      }
      
      @media(max-width:500px){
        #fileList{
          width:100%
        }
        .consola{
          display:none
        }
        #tab:checked~.box-a #fileList{
          display:none
        }
        #tab:checked~.box-a .consola{
          display:flex
        }
      }
      
        .folder { font-weight: bold; cursor: pointer; }
        .file-button { margin-right: 10px; }
        #message { color: red; }
        img { max-width: 300px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<main>
<input id="tab" style="display:none" type="checkbox">
<section class="padding">
    <input type="text" id="repo" placeholder="usuario/repo">
    <button id="loadFiles">Cargar Archivos</button>
    <label for="tab">#</label>
</section>
<section class="ruta padding">
  <span>/</span>
  <span id="ruta"></span>
</section>

<div class="box-a padding">
<div id="fileList">...</div>
<div class="box consola">
<img id="imagePreview" style="display:none;" alt="Vista previa de la imagen">
<textarea wrap="off" id="fileContent"></textarea>
<div>
<button id="saveFile" style="display:none;">Guardar Cambios</button>
<button id="deleteFile" style="display:none;">Eliminar Archivo</button>
</div>
</div></div>


<div id="message"></div>


<section class="padding">
<section>
<input type="file" id="fileInput">
<button id="uploadFile">Subir</button>
</section>
<section>
<input type="text" id="newFileName" placeholder="name.ext">
<button id="createFile">Crear</button>
</section>
</section>
<input id="tok">
</main>









<script>
const github = 'reidelrb';
const token = tok.value; // Reemplaza con tu token de acceso personal
const apiBase = 'https://api.github.com';
let currentPath = ''; // Ruta actual

repo.value=`${github}/${github}.github.io`
function showMessage(msg,t) {
    const messageDiv = document.getElementById('message');
    messageDiv.textContent = msg;
    t&&(setTimeout(() => {messageDiv.textContent = ''}, 1000*t));
    !msg&&(messageDiv.textContent='')
}

document.getElementById('loadFiles').addEventListener('click', async () => {
    const repo = document.getElementById('repo').value;
    currentPath = ''; // Reiniciar la ruta
    await loadDirectory(repo, currentPath);
});

async function loadDirectory(repo, path) {
    showMessage('Cargando archivos...');
    ruta.innerHTML = currentPath
    try {
        const response = await fetch(`${apiBase}/repos/${repo}/contents/${path}?${(new Date()).getTime()}`, {
            headers: {
                'Authorization': `token ${token}`
            }
        });
        showMessage()
        if (!response.ok) throw new Error('Error al cargar archivos');

        const files = await response.json();
        console.log(JSON.stringify(files,null,2))
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '';
        document.getElementById('fileContent').value = ''; // Limpiar textarea
        document.getElementById('imagePreview').style.display = 'none'; // Ocultar vista previa de imagen

        if (path) {
            const backButton = document.createElement('button');
            backButton.textContent = 'Volver';
            backButton.onclick = () => {
                const parentPath = '' //path.substring(0, path.lastIndexOf('/'))+'/';
                loadDirectory(repo, parentPath);
            };
            fileList.appendChild(backButton);
        }
        files.forEach(file => {
            if (file.type === 'file') {
                const button = document.createElement('button');
                button.textContent = file.name;
                button.className = 'file-button';
                button.onclick = () => loadFile(repo, file.path);
                fileList.appendChild(button);

                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Eliminar';
                deleteButton.onclick = () => deleteFile(repo, file.path);
                fileList.appendChild(deleteButton);
            } else if (file.type === 'dir') {
                const folderButton = document.createElement('div');
                folderButton.textContent = file.name;
                folderButton.className = 'folder';
                folderButton.onclick = () => {
                    currentPath = file.path; // Actualizar la ruta actual
                    loadDirectory(repo, file.path);
                };
                fileList.appendChild(folderButton);
            }
        });
    } catch (error) {
        showMessage(error.message,1);
    }
}

async function loadFile(repo, path) {
    showMessage('Cargando archivo...');
    
    try {
        const response = await fetch(`${apiBase}/repos/${repo}/contents/${path}`, {
            headers: {
                'Authorization': `token ${token}`
            }
        });

        showMessage()
        if (!response.ok) throw new Error('Error al cargar el archivo');

        const fileData = await response.json();
        

        if (fileData.name.match(/.(jpg|jpeg|png|gif)$/i)) { // Si es una imagen
            const imagePreview = document.getElementById('imagePreview');
            imagePreview.src = `data:image/png;base64,${(fileData.content)}`; // Usar fileData.type
            console.log(imagePreview.src)
            imagePreview.style.display = 'block';
            document.getElementById('fileContent').style.display = 'none'; // Ocultar textarea
            document.getElementById('saveFile').style.display = 'none'; // Ocultar botón guardar
            document.getElementById('deleteFile').style.display = 'inline'; // Mostrar botón eliminar
        } else {
            const content = atob(fileData.content); // Decodificar el contenido base64
            const decoder = new TextDecoder('utf-8');
            document.getElementById('fileContent').value = decoder.decode(new Uint8Array([...content].map(c => c.charCodeAt(0))))||'vacío';

            document.getElementById('fileContent').style.display = 'block'; // Mostrar textarea
            document.getElementById('saveFile').style.display = 'inline'; // Mostrar botón guardar
            document.getElementById('deleteFile').style.display = 'inline'; // Mostrar botón eliminar

        }
        document.getElementById('saveFile').onclick = () => saveFile(repo, path);
        document.getElementById('deleteFile').onclick = () => deleteFile(repo, path);
    } catch (error) {
        showMessage(error.message,1);
    }
}

async function saveFile(repo, path) {
    showMessage('Guardando cambios...');
    
    const content = document.getElementById('fileContent').value;
    const updatedContent = btoa(unescape(encodeURIComponent(content))); // Codificar a base64

    try {
        const response = await fetch(`${apiBase}/repos/${repo}/contents/${path}`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: 'Actualizando archivo desde el editor',
                content: updatedContent,
                sha: await getFileSha(repo, path)
            })
        });

        showMessage()
        if (!response.ok) throw new Error('Error al guardar el archivo');

        alert('Archivo guardado correctamente');
    } catch (error) {
        showMessage(error.message,1);
    }
}

async function deleteFile(repo, path) {
    showMessage('Eliminando archivo...');
    
    try {
        const sha = await getFileSha(repo, path);

        const response = await fetch(`${apiBase}/repos/${repo}/contents/${path}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: 'Eliminando archivo desde el editor',
                sha: sha
            })
        });

        showMessage()
        if (!response.ok) throw new Error('Error al eliminar el archivo');

        alert('Archivo eliminado correctamente');
        loadDirectory(repo, currentPath); // Recargar la carpeta actual
    } catch (error) {
        showMessage(error.message,1);
    }
}

async function getFileSha(repo, path) {
    try {
        const response = await fetch(`${apiBase}/repos/${repo}/contents/${path}`, {
            headers: {
                'Authorization': `token ${token}`
            }
        });
        
        if (!response.ok) throw new Error('Error al obtener SHA del archivo');

        const fileData = await response.json();
        return fileData.sha;
    } catch (error) {
        showMessage(error.message,1);
    }
}

document.getElementById('uploadFile').addEventListener('click', async () => {
    const repo = document.getElementById('repo').value;
    const fileInput = document.getElementById('fileInput');

    if (fileInput.files.length === 0) {
        alert('Por favor selecciona un archivo para subir.');
        return;
    }else{
      showMessage('Subiendo archivo');      
    }

    const file = fileInput.files[0];
    const reader = new FileReader();
    let mime = 'file'

    if (/\.(jpe?g|png|gif)$/i.test(file.name)) {
      mime = 'img'
    }
    
    reader.onloadend = async () => {
      const content = reader.result; // El contenido ya está en formato binario
      if(mime=='file'){
        fileContent.value = content
        encodedContent = btoa(unescape(encodeURIComponent(content))); // Codificar a base64
      }else{
        encodedContent = reader.result.split(',')[1]
      }
        try {
            const response = await fetch(`${apiBase}/repos/${repo}/contents/${currentPath}${file.name}`, { // Usar currentPath
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Subiendo nuevo archivo',
                    content: encodedContent
                })
            });

            if (!response.ok) throw new Error('Error al subir el archivo');

            alert('Archivo subido correctamente');
            loadDirectory(repo, currentPath); // Recargar la carpeta actual
        } catch (error) {
            showMessage(error.message,1);
        }
    };
    if(mime=='file'){
      reader.readAsText(file); // Leer como texto para manejar UTF-8
    }else{
      reader.readAsDataURL(file)
    }
});


fileInput.onchange=function(){
    const fileInput = document.getElementById('fileInput');

    const file = fileInput.files[0];
    const reader = new FileReader();
    let mime = 'file'

    if (/\.(jpe?g|png|gif)$/i.test(file.name)) {
      mime = 'img'
    }
    
    reader.onloadend = async () => {
      const content = reader.result; // El contenido ya está en formato binario
      if(mime=='file'){
        fileContent.value = content
        encodedContent = btoa(unescape(encodeURIComponent(content))); // Codificar a base64
      }else{
        encodedContent = reader.result.split(',')[1]
      }
    }
    if(mime=='file'){
      reader.readAsText(file); // Leer como texto para manejar UTF-8
    }else{
      reader.readAsDataURL(file)
    }
}

document.getElementById('createFile').addEventListener('click', async () => {
    const repo = document.getElementById('repo').value;
    const newFileName = document.getElementById('newFileName').value;

    if (!newFileName) {
        alert('Por favor ingresa un nombre para el nuevo archivo.');
        return;
    }else{
    showMessage('Creando archivo');
    }

    const content = ''; // Contenido inicial del nuevo archivo
    const encodedContent = btoa(unescape(encodeURIComponent(content))); // Codificar a base64

    try {
        const response = await fetch(`${apiBase}/repos/${repo}/contents/${ currentPath!=''?currentPath+'/':'' }${newFileName}`, { // Usar currentPath
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: 'Creando nuevo archivo',
                content: encodedContent
            })
        });

        if (!response.ok) throw new Error('Error al crear el archivo');

        alert('Archivo publicado correctamente',1);
        loadDirectory(repo, currentPath); // Recargar la carpeta actual
    } catch (error) {
        showMessage(error.message,1);
    }
});

loadFiles.click()
</script>

</body>
</html>
