<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Reidelrb Article</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,minimum-scale=1,maximum-scale=1">
    <link rel="canonical" href="https://reidelrb.github.io">
    <style id="style">
      @import url(https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css); @import url(https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@400;900); @import url(https://fonts.googleapis.com/css?family=EB+Garamond%7CWork+Sans:400,700); * {
        box-sizing: border-box;
        user-select: none;
        cursor: default
      }

      html,body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0
      }

      body {
        background: var(--background);
        box-shadow: inset 0 0 4em var(--bg-shadow);
        color: var(--color-font);
        font-family: arial;
        font-size: clamp(15px, 6.2vw, 2.7rem)
      }

      h1 {
        font-size: 2.3em;
        line-height: 1em;
        margin: .2em .3em .1em
      }

      h2 {
        font-size: 1.3em;
        line-height: 1.2em;
        margin: 0 .4em .1em
      }

      h1,h2,footer {
        width: 100%;
        font-family: asap
      }

      p {
        font-family: EB Garamond, times, serif;
        font-size: 1.1em;
        line-height: 1.2em;
        padding: .1em .5em .5em;
        display: inline-block;
        margin: 0;
        width: 100%
      }

      h2,p {
        float: left
      }

      header>div {
        margin: .5em .7em 1em;
        display: flex;
        flex-wrap: wrap;
        font-size: .9em;
        font-family: arial
      }

      [data-time] {
        color: var(--header);
        font-size: .97em;
        font-weight: 900;
        margin: .3em .2em
      }

      [data-view] {
        background: red;
        color: #fff;
        margin: 0 1em .1em 0;
        padding: .2em;
        border-radius: .2em;
        font-weight: 900;
        box-shadow: 0 0 2px #111;
        white-space: nowrap
      }

      [data-auth] {
        width: 100%;
        padding: .3em;
        font-size: .9em
      }

      main {
        width: 100%;
        height: 100%;
        display: block;
        overflow: auto
      }

      article {
        overflow: hidden;
        min-height: 70%;
        width: 100%;
        padding: 1.5em .3em .2em
      }

      img {
        width: 100%;
        display: block;
        background-image: repeating-conic-gradient(#0002 0 25%,transparent 0 50%);
        background-position: 0 0,33px 33px;
        background-size: 70px 70px;
        background-color: #fff1;
        color: var(--color-font);
        font-size: .5em;
        min-height: 1em
      }

      article figure {
        width: calc(100% - 2em);
        font-size: .7em;
        position: relative;
        padding: 0;
        display: inline-block;
        margin: 0 1em;
        outline: 0;
        top: -2em;
        font-weight: 200;
        text-shadow: 0 0 .5em #000;
        color: #fff
      }

      article .g {
        aspect-ratio: 1/1;
        object-fit: cover;
        overflow: auto;
        display: inline-block;
        margin: .3em;
        outline: 0;
        float: left;
        width: calc( 33.3333% - .6em )
      }

      footer {
        background: var(--footer-bg);
        padding: 1em .5em;
        width: 100%;
        min-height: 30%;
        box-shadow: 0 0 1px #000;
        display: flex;
        flex-direction: column;
        justify-content: center
      }

      section.share {
        margin: 0 .2em .1em;
        font-weight: 900
      }

      a {
        color: dodgerblue;
        font-weight: 700
      }

      footer div {
        color: var(--header);
        font-weight: 300
      }

      [data-share] {
        font-size: 1.3em;
        font-weight: 900;
        margin: .3em;
        color: inherit;
        vertical-align: middle;
        display: inline-block
      }

      .fview {
        background-color: rgba(0,0,0,0.9);
        touch-action: none;
        position: fixed;
        z-index: 9999;
        overflow: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0
      }

      .fview img {
        width: 100%;
        height: 100%;
        overflow: hidden;
        object-fit: contain;
        animation: a-p .5s;
        padding: .5em
      }

      .fview a {
        position: absolute;
        top: 0;
        right: 0;
        font-size: 1.5em;
        color: #000;
        text-shadow:0 0 .2em #fff;
        margin: .5em
      }

      .fview div {
        background: var(--background);
        font-size: .9em;
        padding: .5em;
        font-family: asap;
        min-height: 5em;
        text-align: left
      }

      @keyframes a-p {
        0% {
          padding: 80%
        }

        40% {
          padding: 50%
        }
      }

      :root {
        --background: #fff;
        --color-font: #2a2a2a;
        --header: #555;
        --bg-shadow: #0002;
        --footer-bg: #ececec
      }

      .dark-css {
        --background: #444;
        --color-font: #fff;
        --header: yellow;
        --bg-shadow: #000;
        --footer-bg: #111
      }

      @media(min-width: 700px) {
        article {
          width:90%;
          max-width: 35em;
          margin: auto
        }

        .fview div, footer {
          text-align: center
        }

        .fview div {
          min-height: auto
        }

        footer {
          flex-direction: row;
          align-items: center
        }
      }
    </style>
    <style>
      .ups {
        margin: 3em 1em;
        text-align: center
      }

      p, h1, h2 {
        min-height: 1em
      }

      #loading,.g-recaptcha {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: fixed;
        z-index: 9999;
        top: 0;
        left: 0;
        background: rgba(0,0,0,0.4);
        color: #fff
      }
      
      #loading h1{
        text-shadow: 0 0 .3em #000;
        text-align: center;
      }

      .g-recaptcha {
        display: none
      }
      
      footer{
        padding-left: 2.5em        
      }
    </style>
  </head>
  <body>
    <a href="javascript:window.close()"></a>
    <div id="mcaptcha" class="g-recaptcha" data-callback="captcha" data-sitekey="6LdE6qgbAAAAANq2Tal4NuP8YdGwtfdTpCLArNE-">7</div>
    <main>
      <article></article>
      <footer>
        <section class="share">
          <span>Share on</span>
          <label data-share="https://t.me/share/url?url=[host]&text=[title]" class="bi-telegram"></label>
          <label data-share="https://api.whatsapp.com/send?text=[host] [title]" class="bi-whatsapp"></label>
          <label data-share="" class="bi-share-fill"></label>
        </section>
        <div>
          <span>
            October 2024 by <a>v1.0Beta</a>
          </span>
        </div>
     </footer>
    </main>
    <template>
      <header data-user="">
        <h1>Web article about to...</h1>
        <div>
          <span data-view="" class="bi-eye-fill">&nbsp;Views</span>
          <span data-time="" class="bi-calendar2-date">&nbsp;Time ago</span>
          <a data-auth="" class="bi-person-circle">&nbsp;Anónimo</a>
        </div>
      </header>
      <section>
        <p> Crea tu artículo web...</p>
      </section>
    </template>
    <div id="loading">
      <h1>Load...</h1>
    </div>
  </body>
  <script src="edt.js"></script>
  <script id="script">
    (lib = ()=>{
      document.querySelectorAll('.share [data-share]').forEach(a=>{
        a.onclick = function() {
          if (this.dataset.share) {
            open(this.dataset.share.replaceAll('[title]', article.querySelector("h1").innerHTML).replaceAll('[host]', window.location.href))
          } else {
            navigator.share && (navigator.share({
              title: 'Share',
              text: article.querySelector("h1").innerHTML,
              url: window.location.href
            }).then(()=>0).catch(r=>0))
          }
        }
      }
      );
      ((i)=>{
        if (i && i.dataset.view) {
          fetch(`https://api.counterapi.dev/v1/${i.dataset.view}/counter${!sessionStorage.up ? '/up' : ''}`).then(r=>r.json()).then(c=>{
            document.querySelector('[data-view]').innerHTML = ` ${c.count}`;
            sessionStorage.up = true
          }
          ).catch(e=>true)
        }
      }
      )(document.querySelector("[data-view]"));
      (function(e) {
        if (e) {
          let t, o, n = (new Date().getTime() - new Date(e.dataset.time || new Date).getTime()) / 1e3, m = Math.floor(n / 60), r = Math.floor(m / 60), l = Math.floor(r / 24), a = Math.floor(l / 30), $ = Math.floor(a / 12);
          o = $ > 0 ? [$, "year"] : a > 0 ? [a, "month"] : l > 0 ? [l, "day"] : r > 0 ? [r, "hour"] : m > 0 ? [m, "minutes"] : [0, "second"];
          try {
            let m = new Intl.RelativeTimeFormat((window.navigator.language || navigator.browserLanguage),{
              numeric: "auto",
              style: "long"
            });
            t = m.format(-1 * o[0], o[1]),
            n < 0 && (t = "--")
          } catch (i) {}
          e.innerHTML = ' ' + t
        }
      }
      )(document.querySelector("[data-time]"));
      ((f)=>{
        f.forEach(e=>{
          if (e.classList.contains('g')) {
            e.onclick = function() {
              $img_open = this;
              v = document.createElement('div');
              v.className = 'fview';
              v.innerHTML = `<a class="bi-x-circle-fill"></a><img src="${this.src}"><div>${(this.alt || 'Sin info').replace(/[\W]+/gim, ' ')}</div>`;
              v.onclick = function() {
                this.remove()
              }
              ;
              v.ondragstart = ()=>false;
              v.onpointerdown = function() {
                $pi = event.clientX;
                v.setPointerCapture(event.pointerId);
                v.onpointerup = function(event) {
                  if ($pi > event.clientX + 150) {
                    let nx = $img_open.nextElementSibling;
                    nx && nx.classList.contains('g') && (this.remove(),
                    nx.click())
                  }
                  if ($pi + 150 < event.clientX) {
                    let pv = $img_open.previousElementSibling;
                    pv && pv.classList.contains('g') && (this.remove(),
                    pv.click())
                  }
                }
              }
              ;
              document.body.prepend(v)
            }
          }
          e.onerror = function() {
            let i = document.createElement("canvas")
              , $ = i.getContext("2d");
            this.src = (i.width = 400,
            i.height = 200,
            $.fillStyle = "#0000",
            $.fillRect(0, 0, i.width, i.height),
            $.font = "900 90px asap",
            $.fillStyle = "#acacac",
            $.textAlign = "center",
            $.textBaseline = "middle",
            $.fillText('404', i.width / 2, i.height / 2),
            i.toDataURL())
          }
          ;
          !e.classList.contains('g') && (k = document.createElement('figure'),
          k.innerHTML = `by <b>${(new URL(e.src || 'http://example.com')).origin}</b>`,
          e.after(k))
        }
        )
      }
      )(document.querySelectorAll('article img'))
    }
    )();
    article = document.querySelector('article');
    ((n = (new Date).getHours()) > 17 || n < 7) && document.documentElement.classList.toggle("dark-css");
  </script>
  <script>


  </script>
</html>
